<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tournament — Serious Gamers</title>
  <link rel="stylesheet" href="portal.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    .tab-bar{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
    .tab{padding:10px 20px;font-size:.85rem;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .match-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;transition:border-color .15s}
    .match-card.confirmed{border-color:rgba(0,224,122,.25)}
    .match-card.my-match{border-color:rgba(0,200,255,.3)}
    .match-layout{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .match-side{flex:1;min-width:100px}
    .match-side.right{text-align:right}
    .match-team{font-size:.72rem;color:var(--text-dim);margin-bottom:2px}
    .match-player{font-weight:700;font-size:.95rem}
    .match-center{text-align:center;min-width:160px}
    .match-score{font-family:'Bebas Neue',cursive;font-size:1.8rem;letter-spacing:4px;color:var(--gold);line-height:1}
    .score-inputs{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:6px}
    .score-box{width:44px;height:44px;text-align:center;font-size:1.2rem;font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text)}
    .score-vs{font-size:.65rem;letter-spacing:2px;color:var(--text-dim)}
    .screenshot-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid rgba(0,224,122,.3);cursor:pointer}
    .champion-banner{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border:1px solid rgba(255,215,0,.4);border-radius:16px;padding:32px 24px;text-align:center;margin-bottom:20px}
    .champion-name{font-family:'Bebas Neue',cursive;font-size:2.4rem;letter-spacing:4px;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .reg-banner{background:linear-gradient(135deg,rgba(0,224,122,.08),rgba(0,200,255,.06));border:1px solid rgba(0,224,122,.3);border-radius:12px;padding:20px 24px;margin-bottom:20px}
    .reg-form-open{margin-top:16px;padding-top:16px;border-top:1px solid rgba(0,224,122,.2);display:none}
    .reg-form-open.open{display:block}
    .bracket-wrap{display:flex;gap:0;overflow-x:auto;padding-bottom:16px}
    .bracket-round{min-width:200px;display:flex;flex-direction:column}
    .round-label{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:10px}
    .bracket-slots{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px;padding:0 8px}
    .bracket-tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .bracket-tile.gold-border{border-color:var(--gold);box-shadow:0 0 12px rgba(255,208,96,.2)}
    .bracket-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.82rem}
    .bracket-row:last-child{border-bottom:none}
    .bracket-row.winner{background:rgba(0,224,122,.1);color:var(--green);font-weight:700}
    .bracket-sc{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--gold);min-width:20px;text-align:right}
  </style>
</head>
<body>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" id="hamburgerBtn">☰</button>
      <button class="btn btn-ghost btn-sm" onclick="history.back()">Back</button>
      <span class="topbar-title" id="topbarTitle">TOURNAMENT</span>
    </div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>
  <div class="page-content">
    <div id="tournamentHeader" style="margin-bottom:16px"></div>
    <div id="championBanner"></div>
    <div id="registerBanner" style="display:none">
      <div class="reg-banner">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
          <div>
            <div style="font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:2px;color:var(--green);margin-bottom:4px">🎮 Registration is Open!</div>
            <div style="font-size:.85rem;color:var(--text-dim)">You haven't joined this tournament yet. Pick a team to enter.</div>
          </div>
          <button class="btn btn-green" id="registerNowBtn" onclick="showRegForm()">Register Now →</button>
        </div>
        <div class="reg-form-open" id="regFormArea">
          <div id="regFormMsg" style="margin-bottom:10px"></div>
          <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap">
            <div style="flex:1;min-width:200px">
              <label class="form-label">Choose Your Team</label>
              <select id="teamSelect" class="form-select"><option value="">-- Pick a Team --</option></select>
            </div>
            <button class="btn btn-green" onclick="submitRegister()">Confirm</button>
            <button class="btn btn-ghost" onclick="hideRegForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('players')">Players</div>
      <div class="tab" onclick="switchTab('groups')">Groups</div>
      <div class="tab" onclick="switchTab('fixtures')">Fixtures</div>
      <div class="tab" onclick="switchTab('bracket')">Bracket</div>
    </div>
    <div id="msgArea"></div>
    <div id="tab-players"  class="tab-panel active"></div>
    <div id="tab-groups"   class="tab-panel"></div>
    <div id="tab-fixtures" class="tab-panel"></div>
    <div id="tab-bracket"  class="tab-panel"></div>
  </div>
</div>
<div class="modal-backdrop" id="imgModal" onclick="this.classList.remove('open')">
  <div class="modal" style="background:transparent;box-shadow:none;padding:0;max-width:90vw">
    <img id="imgModalSrc" src="" style="max-width:100%;max-height:85vh;border-radius:8px;display:block">
  </div>
</div>
<script type="module">
import { buildNav } from './nav.js';
const player = buildNav('tournaments');
const params = new URLSearchParams(location.search);
const tid = params.get('id');
if (!tid) location.href = 'tournaments.html';
let tournament, groups, matches, myRegId;

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const idx = ['players','groups','fixtures','bracket'].indexOf(tab);
  document.querySelectorAll('.tab')[idx]?.classList.add('active');
  document.getElementById('tab-'+tab)?.classList.add('active');
};

async function load() {
  try {
    const [tRes,gRes,mRes] = await Promise.all([
      fetch('/api/tournaments/'+tid),
      fetch('/api/tournaments/'+tid+'/groups'),
      fetch('/api/tournaments/'+tid+'/matches'),
    ]);
    tournament = await tRes.json();
    groups     = await gRes.json();
    matches    = await mRes.json();
    const myReg = (tournament.registrations||[]).find(r => r.player_id == player.id);
    myRegId = myReg?.id;
    document.getElementById('topbarTitle').textContent = tournament.name?.toUpperCase();
    renderHeader();
    renderChampionBanner();
    checkRegBanner();
    renderPlayers();
    renderGroups();
    renderFixtures();
    renderBracket();
  } catch(err) {
    document.getElementById('msgArea').innerHTML = '<div class="alert alert-error">Failed to load: '+err.message+'</div>';
  }
}

function renderHeader() {
  const statusMap = {
    registration:{chip:'chip-green',label:'● Registration Open'},
    group_stage: {chip:'chip-cyan', label:'● Group Stage'},
    knockout:    {chip:'chip-gold', label:'● Knockout'},
    completed:   {chip:'chip-dim',  label:'✓ Completed'},
  };
  const s   = statusMap[tournament.status]||statusMap.completed;
  const pct = Math.round((tournament.registered_count/tournament.max_players)*100);
  document.getElementById('tournamentHeader').innerHTML = `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-family:'Bebas Neue',cursive;font-size:1.8rem;letter-spacing:3px;margin-bottom:6px">${tournament.name}</div>
        ${tournament.description?'<div style="color:var(--text-dim);font-size:.85rem;margin-bottom:10px">'+tournament.description+'</div>':''}
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <span class="chip ${s.chip}">${s.label}</span>
          <span style="font-size:.78rem;color:var(--text-dim)">${tournament.max_players}-player</span>
          ${myRegId?'<span class="chip chip-cyan">✓ You\'re In</span>':''}
        </div>
      </div>
      <div style="min-width:150px">
        <div style="font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">PLAYERS</div>
        <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:.78rem;color:var(--text-dim);margin-top:5px">${tournament.registered_count} / ${tournament.max_players}</div>
      </div>
    </div>`;
}

function renderChampionBanner() {
  const el = document.getElementById('championBanner');
  if (tournament.status !== 'completed') { el.innerHTML=''; return; }
  const fin = matches.find(m => m.stage==='final' && m.confirmed);
  if (!fin) { el.innerHTML=''; return; }
  const hw = fin.home_score > fin.away_score;
  const winner = hw ? fin.home_player    : fin.away_player;
  const team   = hw ? fin.home_team_name : fin.away_team_name;
  el.innerHTML = `
    <div class="champion-banner">
      <div style="font-size:3rem;margin-bottom:8px;filter:drop-shadow(0 0 16px rgba(255,215,0,.5))">🏆</div>
      <div style="font-size:.62rem;letter-spacing:4px;text-transform:uppercase;color:#FFA500;margin-bottom:8px">Tournament Champion</div>
      <div class="champion-name">${winner}</div>
      <div style="font-size:.82rem;color:var(--text-dim);margin-top:4px;margin-bottom:12px">${team}</div>
      <div style="font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:3px;color:var(--text-dim)">Final Score: ${fin.home_score} – ${fin.away_score}</div>
    </div>`;
}

function checkRegBanner() {
  const banner = document.getElementById('registerBanner');
  if (tournament.status==='registration' && !myRegId && tournament.registered_count < tournament.max_players) {
    banner.style.display='block'; loadAvailableTeams();
  } else { banner.style.display='none'; }
}

async function loadAvailableTeams() {
  const res = await fetch('/api/tournaments/'+tid+'/available-teams');
  const teams = await res.json();
  const sel = document.getElementById('teamSelect');
  sel.innerHTML = teams.length
    ? '<option value="">-- Pick a Team --</option>'+teams.map(t=>'<option value="'+t.id+'">'+t.name+'</option>').join('')
    : '<option value="">No teams left</option>';
}

window.showRegForm  = () => { document.getElementById('regFormArea').classList.add('open'); document.getElementById('registerNowBtn').style.display='none'; };
window.hideRegForm  = () => { document.getElementById('regFormArea').classList.remove('open'); document.getElementById('registerNowBtn').style.display=''; };
window.submitRegister = async function() {
  const team_id = parseInt(document.getElementById('teamSelect').value);
  const msg = document.getElementById('regFormMsg');
  if (!team_id) { msg.innerHTML='<div class="alert alert-error">Pick a team.</div>'; return; }
  try {
    const res  = await fetch('/api/tournaments/'+tid+'/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({player_id:player.id, team_id})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    msg.innerHTML = '<div class="alert alert-success">You\'re in! 🎉</div>';
    setTimeout(() => load(), 1000);
  } catch(err) { msg.innerHTML='<div class="alert alert-error">'+err.message+'</div>'; }
};

function renderPlayers() {
  const el   = document.getElementById('tab-players');
  const regs = tournament.registrations||[];
  if (!regs.length) { el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">NO PLAYERS YET</div></div>'; return; }
  el.innerHTML = '<div class="card"><table class="tbl"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Joined</th></tr></thead><tbody>'
    + regs.map((r,i)=>'<tr><td class="center" style="color:var(--text-dim)">'+(i+1)+'</td><td class="bold">'+r.username+(r.player_id==player.id?' <span class="chip chip-cyan" style="font-size:.6rem">You</span>':'')+'</td><td>'+r.team_name+'</td><td style="color:var(--text-dim);font-size:.78rem">'+new Date(r.created_at).toLocaleDateString()+'</td></tr>').join('')
    + '</tbody></table></div>';
}

function renderGroups() {
  const el = document.getElementById('tab-groups');
  if (!groups.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">GROUPS NOT DRAWN YET</div></div>'; return; }
  const byGroup = {};
  groups.forEach(g => { if(!byGroup[g.group_name]) byGroup[g.group_name]=[]; byGroup[g.group_name].push(g); });
  Object.keys(byGroup).forEach(gn => byGroup[gn].sort((a,b) => b.points-a.points||(b.gf-b.ga)-(a.gf-a.ga)));
  el.innerHTML = '<div class="groups-grid">'+Object.keys(byGroup).sort().map(gn => {
    const teams = byGroup[gn];
    return '<div class="card"><div class="group-header"><div class="group-letter">'+gn+'</div><div class="group-divider"></div></div>'
      +'<table class="tbl"><thead><tr><th>#</th><th>Player</th><th class="center">P</th><th class="center">W</th><th class="center">D</th><th class="center">L</th><th class="center">GD</th><th class="center">PTS</th></tr></thead><tbody>'
      +teams.map((t,i) => { const gd=t.gf-t.ga; return '<tr><td class="center '+(i<2?'pos-q':'')+'">'+(i+1)+'</td><td class="bold">'+(t.username||'?')+'</td><td class="center">'+t.played+'</td><td class="center">'+t.won+'</td><td class="center">'+t.drawn+'</td><td class="center">'+t.lost+'</td><td class="center" style="color:'+(gd>0?'var(--green)':gd<0?'var(--red)':'inherit')+'">'+(gd>0?'+':'')+gd+'</td><td class="pts">'+t.points+'</td></tr>'; }).join('')
      +'</tbody></table></div>';
  }).join('')+'</div>';
}

function renderFixtures() {
  const el = document.getElementById('tab-fixtures');
  if (!matches.length) { el.innerHTML='<div class="empty"><div class="empty-icon">⚽</div><div class="empty-title">NO FIXTURES YET</div></div>'; return; }
  const stageOrder = ['group','round-of-128','round-of-64','round-of-32','round-of-16','quarter-final','semi-final','final'];
  const stages = [...new Set(matches.map(m=>m.stage))].sort((a,b)=>stageOrder.indexOf(a)-stageOrder.indexOf(b));
  let html = '';
  stages.forEach(stage => {
    const sm = matches.filter(m=>m.stage===stage);
    if (stage==='group') {
      const byGroup = {};
      sm.forEach(m => { const k=m.group_name||'A'; if(!byGroup[k]) byGroup[k]=[]; byGroup[k].push(m); });
      Object.keys(byGroup).sort().forEach(gn => {
        html += '<div style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px">Group '+gn+'</div>';
        byGroup[gn].forEach(m => { html += buildMatchCard(m); });
      });
    } else {
      const label = stage.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
      html += '<div style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:16px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px">'+label+'</div>';
      sm.sort((a,b)=>(a.match_order||0)-(b.match_order||0)).forEach(m => { html += buildMatchCard(m); });
    }
  });
  el.innerHTML = html;
  el.querySelectorAll('.save-btn').forEach(btn => btn.addEventListener('click', () => saveScore(btn.dataset.id)));
  el.querySelectorAll('.file-input').forEach(input => input.addEventListener('change', () => handleImageUpload(input)));
}

function buildMatchCard(m) {
  const isMyMatch = m.home_reg_id == myRegId || m.away_reg_id == myRegId;
  const confirmed = m.confirmed;
  const hasScore  = m.home_score !== null && m.away_score !== null;
  let center = '';
  if (confirmed) {
    center = '<div class="match-score">'+m.home_score+' – '+m.away_score+'</div>'
      +'<div style="margin-top:4px"><span class="chip chip-green" style="font-size:.6rem">✓ Confirmed</span></div>'
      +(m.screenshot_url?'<img src="'+m.screenshot_url+'" class="screenshot-thumb" style="margin-top:8px" onclick="viewImg(\''+m.screenshot_url+'\')">':'');
  } else if (isMyMatch) {
    center = '<div class="score-inputs">'
      +'<input class="score-box" type="number" min="0" max="99" id="hs_'+m.id+'" value="'+(m.home_score??'')+'" placeholder="-">'
      +'<span class="score-vs">VS</span>'
      +'<input class="score-box" type="number" min="0" max="99" id="as_'+m.id+'" value="'+(m.away_score??'')+'" placeholder="-">'
      +'</div>'
      +'<button class="btn btn-cyan btn-sm save-btn" data-id="'+m.id+'" style="font-size:.72rem;padding:4px 14px;margin-top:6px">Save Score</button>'
      +'<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
      +'<div style="font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">📸 Screenshot</div>'
      +'<label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:.78rem;color:var(--text)">📎 '+(m.screenshot_url?'Replace image':'Upload image')
      +'<input type="file" class="file-input" accept="image/*" data-match="'+m.id+'" style="display:none"></label>'
      +(m.screenshot_url?'<div style="margin-top:8px;display:flex;align-items:center;gap:8px"><img src="'+m.screenshot_url+'" class="screenshot-thumb" onclick="viewImg(\''+m.screenshot_url+'\')"><span class="chip chip-green" style="font-size:.6rem">✓ Uploaded</span></div>':'<div style="font-size:.72rem;color:var(--text-dim);margin-top:6px">No screenshot yet</div>')
      +'<div id="upload-status-'+m.id+'" style="font-size:.72rem;margin-top:4px"></div>'
      +'</div>'
      +(hasScore&&!m.screenshot_url?'<div style="font-size:.68rem;color:var(--gold);margin-top:6px">⚠ Upload screenshot for admin to confirm</div>':'');
  } else {
    center = '<div class="match-score" style="color:'+(hasScore?'var(--gold)':'var(--text-dim)')+';font-size:'+(hasScore?'1.8rem':'1rem')+'">'+(hasScore?m.home_score+' – '+m.away_score:'— vs —')+'</div>'
      +(m.screenshot_url?'<img src="'+m.screenshot_url+'" class="screenshot-thumb" style="margin-top:8px" onclick="viewImg(\''+m.screenshot_url+'\')">':'');
  }
  return '<div class="match-card '+(confirmed?'confirmed':'')+' '+(isMyMatch?'my-match':'')+'" data-match="'+m.id+'">'
    +'<div class="match-layout">'
    +'<div class="match-side"><div class="match-team">'+m.home_team_name+'</div><div class="match-player">'+m.home_player+'</div></div>'
    +'<div class="match-center">'+center+'</div>'
    +'<div class="match-side right"><div class="match-team">'+m.away_team_name+'</div><div class="match-player">'+m.away_player+'</div></div>'
    +'</div></div>';
}

async function handleImageUpload(input) {
  const matchId = input.dataset.match;
  const file    = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('upload-status-'+matchId);
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-dim)">Uploading...</span>';
  try {
    const tokenRes = await fetch('/api/tournaments/'+tid+'/matches/'+matchId+'/screenshot-url', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({filename: matchId+Date.now()+'.jpg'})
    });
    const tokenData = await tokenRes.json();
    if (!tokenRes.ok) throw new Error(tokenData.error||tokenData.message);
    const uploadRes = await fetch(tokenData.upload_url, {
      method:'PUT', headers:{'Content-Type':'image/jpeg','x-upsert':'true'}, body: file
    });
    if (!uploadRes.ok) throw new Error('Storage error: '+await uploadRes.text());
    await fetch('/api/tournaments/'+tid+'/matches/'+matchId+'/score', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        home_score: parseInt(document.getElementById('hs_'+matchId)?.value)||0,
        away_score: parseInt(document.getElementById('as_'+matchId)?.value)||0,
        screenshot_url: tokenData.public_url
      })
    });
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)">✓ Uploaded!</span>';
    setTimeout(() => load(), 1000);
  } catch(err) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">'+err.message+'</span>';
  }
}

async function saveScore(id) {
  const hs  = document.getElementById('hs_'+id)?.value;
  const as  = document.getElementById('as_'+id)?.value;
  const msg = document.getElementById('msgArea');
  if (hs===''||as==='') { msg.innerHTML='<div class="alert alert-error">Enter both scores.</div>'; setTimeout(()=>msg.innerHTML='',3000); return; }
  try {
    const res  = await fetch('/api/tournaments/'+tid+'/matches/'+id+'/score', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({home_score:parseInt(hs), away_score:parseInt(as)})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    msg.innerHTML = '<div class="alert alert-success">Score saved! Upload a screenshot so admin can confirm.</div>';
    setTimeout(()=>{ msg.innerHTML=''; load(); }, 2000);
  } catch(err) { msg.innerHTML='<div class="alert alert-error">'+err.message+'</div>'; }
}

window.viewImg = function(url) {
  document.getElementById('imgModalSrc').src = url;
  document.getElementById('imgModal').classList.add('open');
};

function renderBracket() {
  const el = document.getElementById('tab-bracket');
  const ko = matches.filter(m => m.stage!=='group');
  if (!ko.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">BRACKET NOT STARTED</div><div class="empty-sub">Complete the group stage first.</div></div>'; return; }
  const rounds  = ['round-of-128','round-of-64','round-of-32','round-of-16','quarter-final','semi-final','final'];
  const present = rounds.filter(r => ko.some(m => m.stage===r));
  el.innerHTML = '<div class="bracket-wrap">'+present.map(stage => {
    const ms = ko.filter(m=>m.stage===stage).sort((a,b)=>(a.match_order||0)-(b.match_order||0));
    return '<div class="bracket-round"><div class="round-label">'+stage.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase())+'</div><div class="bracket-slots">'
      +ms.map(m => {
        if (!m.home_team_id&&!m.away_team_id) return '<div class="bracket-tile"><div class="bracket-row" style="color:var(--text-dim);font-style:italic">TBD</div><div class="bracket-row" style="color:var(--text-dim);font-style:italic">TBD</div></div>';
        const hw = m.confirmed&&m.home_score>m.away_score;
        const aw = m.confirmed&&m.away_score>m.home_score;
        return '<div class="bracket-tile '+(stage==='final'?'gold-border':'')+'"><div class="bracket-row '+(hw?'winner':'')+'"><span>'+(m.home_player||m.home_team_name||'TBD')+'</span><span class="bracket-sc">'+(m.home_score!==null?m.home_score:'-')+'</span></div><div class="bracket-row '+(aw?'winner':'')+'"><span>'+(m.away_player||m.away_team_name||'TBD')+'</span><span class="bracket-sc">'+(m.away_score!==null?m.away_score:'-')+'</span></div></div>';
      }).join('')+'</div></div>';
  }).join('')+'</div>';
  const fin = ko.find(m=>m.stage==='final'&&m.confirmed);
  if (fin) {
    const champ = fin.home_score>fin.away_score ? fin.home_player : fin.away_player;
    el.innerHTML += '<div style="text-align:center;padding:30px 20px"><div style="font-size:3rem;margin-bottom:10px">🏆</div><div style="font-family:\'Bebas Neue\',cursive;font-size:2rem;letter-spacing:4px;color:var(--gold);text-shadow:0 0 20px rgba(255,208,96,.5)">'+champ+'</div><div style="font-size:.7rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-top:4px">Champion</div></div>';
  }
}

load();
</script>
</body>
</html>
